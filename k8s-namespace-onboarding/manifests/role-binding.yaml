apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: <role-binding-name>
  namespace: <namespace-name>
  labels:
    app.kubernetes.io/managed-by: platform-team
subjects:
  - kind: ServiceAccount
    name: <service-account-name>
    namespace: <namespace-name>
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
